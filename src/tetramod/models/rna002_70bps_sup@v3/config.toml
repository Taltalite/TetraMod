[model]
package = "bonito.crf"

[labels]
labels = [ "N", "A", "C", "G", "T",]

[input]
features = 1

[run_info]
sample_rate = 3000

[global_norm]
state_len = 5

[encoder]
activation = "swish"
stride = 5
rnn_type = "lstm"
features = 768
scale = 5.0
winlen = 19
blank_score = 2.0

[normalisation]
quantile_a = 0.2
quantile_b = 0.8
shift_multiplier = 0.48
scale_multiplier = 0.59

[qscore]
scale = 0.7
bias = 1.3

[basecaller]
batchsize = 128
chunksize = 10000
overlap = 500
